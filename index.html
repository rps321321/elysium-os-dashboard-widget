<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elysium Widget</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #0e1016; font-family: Georgia, serif; overflow: hidden; }
.wrap { width: 100%; height: 100%; background: #0e1016; border: 0.5px solid #2a2a38; border-radius: 14px; overflow: hidden; position: relative; }
canvas.stars { position: absolute; inset: 0; pointer-events: none; z-index: 0; }
.top { position: relative; z-index: 1; display: flex; flex-direction: column; align-items: center; padding: 28px 32px 20px; gap: 6px; }
.elysium-label { font-size: 10px; letter-spacing: 0.4em; color: #c9a84c; text-transform: uppercase; }
.greeting { font-size: 26px; font-weight: 400; color: #e8e4dc; letter-spacing: 0.03em; }
.dateline { font-size: 10px; letter-spacing: 0.2em; color: #3a3a50; text-transform: uppercase; }
.divider-gold { width: 50px; height: 0.5px; background: linear-gradient(90deg, transparent, #c9a84c55, transparent); margin: 4px auto 0; }
.bar { position: relative; z-index: 1; display: flex; align-items: stretch; border-top: 0.5px solid #2a2a38; height: 208px; }
.pill { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px 24px; flex: 1; min-width: 0; }
.clock-pill { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; padding: 20px 24px; width: 170px; flex-shrink: 0; }
.sep { width: 0.5px; background: linear-gradient(180deg, transparent 5%, #2a2a3a 30%, #2a2a3a 70%, transparent 95%); flex-shrink: 0; align-self: stretch; }
.pill-label { font-size: 9px; letter-spacing: 0.22em; color: #3a3a50; text-transform: uppercase; text-align: center; }
.pill-main { font-size: 32px; font-weight: 400; color: #e2ddd4; letter-spacing: 0.02em; line-height: 1; text-align: center; }
.pill-sub { font-size: 9px; letter-spacing: 0.16em; color: #44445a; text-transform: uppercase; text-align: center; white-space: nowrap; }
.pill-desc { font-size: 10px; color: #7799bb; letter-spacing: 0.08em; text-align: center; }
</style>
</head>
<body>
<div class="wrap">
  <canvas class="stars" id="starfield"></canvas>
  <div class="top">
    <div class="elysium-label">Elysium OS</div>
    <div class="greeting" id="greeting">Good evening, Raghav</div>
    <div class="dateline" id="dateline"></div>
    <div class="divider-gold"></div>
  </div>
  <div class="bar">
    <div class="pill">
      <svg width="36" height="36" viewBox="0 0 22 22" fill="none">
        <circle cx="11" cy="11" r="5" fill="#c9a84c" opacity="0.9"/>
        <g stroke="#c9a84c" stroke-width="1" opacity="0.4">
          <line x1="11" y1="1" x2="11" y2="3.5"/><line x1="11" y1="18.5" x2="11" y2="21"/>
          <line x1="1" y1="11" x2="3.5" y2="11"/><line x1="18.5" y1="11" x2="21" y2="11"/>
          <line x1="3.8" y1="3.8" x2="5.6" y2="5.6"/><line x1="16.4" y1="16.4" x2="18.2" y2="18.2"/>
          <line x1="18.2" y1="3.8" x2="16.4" y2="5.6"/><line x1="5.6" y1="16.4" x2="3.8" y2="18.2"/>
        </g>
      </svg>
      <div class="pill-main" id="temp">--°C</div>
      <div class="pill-desc" id="condition">Loading...</div>
      <div class="pill-sub">Niš, Serbia</div>
    </div>
    <div class="sep"></div>
    <div class="pill">
      <svg width="30" height="30" viewBox="0 0 20 20" fill="none">
        <path d="M10 2 C10 2 5 8 5 12 a5 5 0 0 0 10 0 C15 8 10 2 10 2Z" fill="none" stroke="#7799bb" stroke-width="1.2" stroke-linejoin="round" opacity="0.8"/>
        <path d="M7.5 13 a2.5 2.5 0 0 0 5 0" fill="none" stroke="#7799bb" stroke-width="0.8" opacity="0.4"/>
      </svg>
      <div class="pill-main" id="humidity" style="color:#8899bb;">--%</div>
      <div class="pill-sub">Humidity</div>
    </div>
    <div class="sep"></div>
    <div class="clock-pill">
      <div class="pill-label">Niš, Serbia</div>
      <svg width="80" height="80" viewBox="0 0 34 34">
        <circle cx="17" cy="17" r="15" fill="#0d0f14" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
        <line id="hNis" x1="17" y1="17" x2="17" y2="9" stroke="#c9a84c" stroke-width="1.4" stroke-linecap="round"/>
        <line id="mNis" x1="17" y1="17" x2="17" y2="5" stroke="#7799bb" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
        <circle cx="17" cy="17" r="1.2" fill="#c9a84c"/>
      </svg>
      <div class="pill-main" id="tNis" style="font-size:20px;">--:--</div>
    </div>
    <div class="sep"></div>
    <div class="clock-pill">
      <div class="pill-label">Gorakhpur, India</div>
      <svg width="80" height="80" viewBox="0 0 34 34">
        <circle cx="17" cy="17" r="15" fill="#0d0f14" stroke="#c9a84c" stroke-width="0.5" opacity="0.6"/>
        <line id="hGor" x1="17" y1="17" x2="17" y2="9" stroke="#c9a84c" stroke-width="1.4" stroke-linecap="round"/>
        <line id="mGor" x1="17" y1="17" x2="17" y2="5" stroke="#7799bb" stroke-width="0.9" stroke-linecap="round" opacity="0.8"/>
        <circle cx="17" cy="17" r="1.2" fill="#c9a84c"/>
      </svg>
      <div class="pill-main" id="tGor" style="font-size:20px;">--:--</div>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('starfield');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight; }
resizeCanvas();
const stars = Array.from({length:80},()=>({x:Math.random(),y:Math.random(),r:Math.random()*1.1+0.2,o:Math.random()*0.4+0.07}));
function drawStars(){ctx.clearRect(0,0,canvas.width,canvas.height);stars.forEach(s=>{ctx.beginPath();ctx.arc(s.x*canvas.width,s.y*canvas.height,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(255,255,255,${s.o})`;ctx.fill();});}
drawStars();
const WMO={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',48:'Icy fog',51:'Light drizzle',53:'Drizzle',55:'Heavy drizzle',61:'Light rain',63:'Rain',65:'Heavy rain',71:'Light snow',73:'Snow',75:'Heavy snow',80:'Rain showers',81:'Rain showers',82:'Heavy showers',95:'Thunderstorm',99:'Thunderstorm'};
async function fetchWeather(){try{const res=await fetch('https://api.open-meteo.com/v1/forecast?latitude=43.3209&longitude=21.8954&current=temperature_2m,relative_humidity_2m,weathercode&temperature_unit=celsius&timezone=Europe%2FBelgrade');const data=await res.json();const c=data.current;document.getElementById('temp').textContent=Math.round(c.temperature_2m)+'°C';document.getElementById('humidity').textContent=Math.round(c.relative_humidity_2m)+'%';document.getElementById('condition').textContent=WMO[c.weathercode]||'Clear';}catch(e){document.getElementById('condition').textContent='Unavailable';}}
fetchWeather();
const DAYS=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
function getTimeParts(tz){const parts=new Intl.DateTimeFormat('en-GB',{timeZone:tz,hour:'numeric',minute:'numeric',second:'numeric',hour12:false}).formatToParts(new Date());const get=t=>+parts.find(p=>p.type===t).value;return{h:get('hour'),m:get('minute'),s:get('second')};}
function rotateHand(id,deg,len){const el=document.getElementById(id);const rad=(deg-90)*Math.PI/180;el.setAttribute('x2',(17+Math.cos(rad)*len).toFixed(2));el.setAttribute('y2',(17+Math.sin(rad)*len).toFixed(2));}
function pad(n){return String(n).padStart(2,'0');}
function tick(){const now=new Date();const nis=getTimeParts('Europe/Belgrade');const gor=getTimeParts('Asia/Kolkata');rotateHand('hNis',(nis.h%12)/12*360+nis.m/60*30,8);rotateHand('mNis',nis.m/60*360+nis.s/60*6,12);rotateHand('hGor',(gor.h%12)/12*360+gor.m/60*30,8);rotateHand('mGor',gor.m/60*360+gor.s/60*6,12);document.getElementById('tNis').textContent=pad(nis.h)+':'+pad(nis.m);document.getElementById('tGor').textContent=pad(gor.h)+':'+pad(gor.m);const h=nis.h;document.getElementById('greeting').textContent=(h<12?'Good morning':h<17?'Good afternoon':'Good evening')+', Raghav';document.getElementById('dateline').textContent=DAYS[now.getDay()]+' · '+now.getDate()+' '+MONTHS[now.getMonth()]+' '+now.getFullYear()+' · Niš, Serbia';}
tick();setInterval(tick,1000);
</script>
</body>
</html>
